name: Kiza

on:
  push:
    branches:
      - main

jobs:
  myDeployment:
    runs-on: ubuntu-latest
    steps:
      - name: For pick the repository
        uses: actions/checkout@v4
      - name: for connection
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{secrets.IP}}
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}

          script: |
            cd /home/rajni/backendkiza/
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 24
            git pull origin main
            npm i
            npm run build
            sudo npm i pm2 -g
            pm2 start --name "Backend" /home/rajni/.nvm/versions/node/v24.18.0/bin/http-server -- -p 3000 -d false
